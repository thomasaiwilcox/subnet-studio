name: Bug report
description: Report reproducible incorrect application behaviour that is not primarily a CIDR calculation issue.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Subnet Studio. Please remove private network information before attaching a workspace.
  - type: input
    id: version
    attributes:
      label: Subnet Studio version
      description: Shown in Help and the bottom status bar.
      placeholder: 2.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Firefox 128 on Windows 11
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the starting CIDR, profile, selected subnet, and exact actions.
      placeholder: |
        1. Open 192.168.1.0/24 with no cloud reservations
        2. Select ...
        3. Choose ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or workspace
      description: Drag in screenshots or a minimal schema-v1 JSON export if it is safe to share.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report does not contain credentials or sensitive network information.
          required: true
        - label: This is not a security vulnerability; security reports follow SECURITY.md.
          required: true
