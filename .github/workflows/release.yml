name: Release standalone application

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate tag and package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const p=require('./package.json'); if (process.env.RELEASE_TAG !== 'v' + p.version) { throw new Error('Tag ' + process.env.RELEASE_TAG + ' does not match package version v' + p.version); }"
      - name: Install dependencies
        run: npm ci
      - name: Verify release build
        run: npm run check
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/index.html dist/social-preview.png --verify-tag --generate-notes --title "Subnet Studio ${{ github.ref_name }}"
